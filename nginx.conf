worker_processes auto;
worker_rlimit_nofile 65536;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Cabeceras de seguridad compatibles con HTTP
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "frame-ancestors 'self';" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        application/x-javascript
        image/svg+xml;

    # ----------------------------------------------------------------------
    # SERVIDOR: HUB (FRONT PÚBLICO)
    # ----------------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name rives.mineducacion.gov.co;

        root /usr/share/nginx/html/public-front;
        index index.html index.htm;

        location / {
            try_files $uri $uri/ /index.html;
            autoindex off;
        }

        location /api/ {
            proxy_pass http://archihub_flask_backend:11000/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 600s;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            send_timeout 600s;
        }

        error_page 500 502 503 504 /50x.html;

        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    # ----------------------------------------------------------------------
    # SERVIDOR: ADMIN
    # ----------------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name rivesadmin.mineducacion.gov.co;

        root /usr/share/nginx/html/admin;
        index index.html index.htm;

        location / {
            try_files $uri $uri/ /index.html;
            autoindex off;
        }

        proxy_connect_timeout 600s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        send_timeout 600s;

        error_page 500 502 503 504 /50x.html;

        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}